name: Feature request
description: Suggest a new shape, API, or capability
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the use case. Focus on the user need, not the implementation.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How should kubik solve this? Sketch an API if you can.
      render: kotlin
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why you rejected them.

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Links, screenshots, related libraries.
