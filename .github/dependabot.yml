# Dependabot configuration.
# Checks for stable dependency updates once a month.
# Docs: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # Gradle dependencies (version catalog + module build files)
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "06:00"
      timezone: "Asia/Kolkata"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "gradle"
    commit-message:
      prefix: "deps"
      include: "scope"
    # Skip all pre-release versions so we only get stable updates.
    ignore:
      - dependency-name: "*"
        versions:
          - "*-alpha*"
          - "*-beta*"
          - "*-rc*"
          - "*-M[0-9]*"
          - "*-SNAPSHOT"
          - "*-dev*"

  # GitHub Actions workflows (if any are added later)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "06:00"
      timezone: "Asia/Kolkata"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
      include: "scope"
